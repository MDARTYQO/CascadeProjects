name: Remote Desktop Interface

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
          - screenshot
          - click
          - type
          - navigate
      url:
        description: 'URL to navigate to'
        required: false
        default: 'https://example.com'
      x:
        description: 'X coordinate for click'
        required: false
      y:
        description: 'Y coordinate for click'
        required: false
      text:
        description: 'Text to type'
        required: false
      selector:
        description: 'CSS selector for element interaction'
        required: false

jobs:
  remote-desktop:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm init -y
        npm install puppeteer express socket.io redis
        # Install localtunnel (free alternative to ngrok)
        npm install -g localtunnel

    - name: Create remote desktop server
      run: |
        cat > server.js << 'EOF'
        const express = require('express');
        const http = require('http');
        const socketIo = require('socket.io');
        const puppeteer = require('puppeteer');
        const redis = require('redis');
        const fs = require('fs');
        const path = require('path');

        const app = express();
        const server = http.createServer(app);
        const io = socketIo(server);
        
        let browser = null;
        let page = null;
        let isRunning = false;

        // Redis client for state management
        const redisClient = redis.createClient({
          host: 'localhost',
          port: 6379
        });

        redisClient.on('error', (err) => console.log('Redis Error:', err));

        // Serve static files
        app.use(express.static('public'));
        app.use(express.json());

        // HTML interface
        app.get('/', (req, res) => {
          res.send(`
            <!DOCTYPE html>
            <html>
            <head>
              <title>Remote Desktop Control</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
                .container { max-width: 1200px; margin: 0 auto; }
                .controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
                .screen-container { background: white; padding: 20px; border-radius: 8px; }
                #screenshot { max-width: 100%; border: 2px solid #ddd; cursor: crosshair; }
                .control-group { margin: 10px 0; }
                input, button, select { margin: 5px; padding: 8px; }
                button { background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
                button:hover { background: #0056b3; }
                button:disabled { background: #ccc; cursor: not-allowed; }
                .status { padding: 10px; border-radius: 4px; margin: 10px 0; }
                .status.connected { background: #d4edda; color: #155724; }
                .status.disconnected { background: #f8d7da; color: #721c24; }
                .coordinates { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; border-radius: 3px; font-size: 12px; pointer-events: none; display: none; }
              </style>
            </head>
            <body>
              <div class="container">
                <h1>Remote Desktop Control Panel</h1>
                
                <div id="status" class="status disconnected">Status: Disconnected</div>
                
                <div class="controls">
                  <h3>Browser Controls</h3>
                  <div class="control-group">
                    <button onclick="startBrowser()">Start Browser</button>
                    <button onclick="stopBrowser()">Stop Browser</button>
                    <button onclick="takeScreenshot()">Take Screenshot</button>
                  </div>
                  
                  <div class="control-group">
                    <input type="text" id="url" placeholder="Enter URL" value="https://example.com">
                    <button onclick="navigate()">Navigate</button>
                  </div>
                  
                  <div class="control-group">
                    <input type="text" id="selector" placeholder="CSS selector (e.g., #button)">
                    <button onclick="clickElement()">Click Element</button>
                  </div>
                  
                  <div class="control-group">
                    <input type="text" id="text" placeholder="Text to type">
                    <button onclick="typeText()">Type Text</button>
                  </div>
                  
                  <div class="control-group">
                    <label>Auto-refresh: </label>
                    <input type="checkbox" id="autoRefresh">
                    <label>Interval (seconds): </label>
                    <input type="number" id="refreshInterval" value="5" min="1" max="60">
                  </div>
                </div>
                
                <div class="screen-container">
                  <h3>Screen Preview (Click to simulate mouse click)</h3>
                  <div style="position: relative;">
                    <img id="screenshot" src="" alt="Screenshot will appear here" onclick="handleImageClick(event)">
                    <div id="coordinates" class="coordinates"></div>
                  </div>
                  <div id="clickInfo" style="margin-top: 10px; color: #666;"></div>
                </div>
              </div>

              <script src="/socket.io/socket.io.js"></script>
              <script>
                const socket = io();
                let autoRefreshInterval = null;

                socket.on('connect', () => {
                  updateStatus('connected');
                  console.log('Connected to server');
                });

                socket.on('disconnect', () => {
                  updateStatus('disconnected');
                  console.log('Disconnected from server');
                });

                socket.on('screenshot', (data) => {
                  document.getElementById('screenshot').src = 'data:image/png;base64,' + data.image;
                });

                socket.on('browserStatus', (data) => {
                  console.log('Browser status:', data);
                });

                function updateStatus(status) {
                  const statusEl = document.getElementById('status');
                  statusEl.className = 'status ' + status;
                  statusEl.textContent = 'Status: ' + status.charAt(0).toUpperCase() + status.slice(1);
                }

                function startBrowser() {
                  fetch('/api/browser/start', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => console.log(data));
                }

                function stopBrowser() {
                  fetch('/api/browser/stop', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => console.log(data));
                }

                function takeScreenshot() {
                  fetch('/api/screenshot', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => console.log(data));
                }

                function navigate() {
                  const url = document.getElementById('url').value;
                  fetch('/api/navigate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                  })
                    .then(res => res.json())
                    .then(data => console.log(data));
                }

                function clickElement() {
                  const selector = document.getElementById('selector').value;
                  fetch('/api/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ selector })
                  })
                    .then(res => res.json())
                    .then(data => console.log(data));
                }

                function typeText() {
                  const text = document.getElementById('text').value;
                  fetch('/api/type', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                  })
                    .then(res => res.json())
                    .then(data => console.log(data));
                }

                function handleImageClick(event) {
                  const img = event.target;
                  const rect = img.getBoundingClientRect();
                  const x = Math.round((event.clientX - rect.left) * (img.naturalWidth / rect.width));
                  const y = Math.round((event.clientY - rect.top) * (img.naturalHeight / rect.height));
                  
                  document.getElementById('clickInfo').textContent = 'Click at: X=' + x + ', Y=' + y;
                  
                  fetch('/api/click-coords', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ x, y })
                  })
                    .then(res => res.json())
                    .then(data => console.log(data));
                }

                // Auto-refresh functionality
                document.getElementById('autoRefresh').addEventListener('change', function() {
                  if (this.checked) {
                    const interval = parseInt(document.getElementById('refreshInterval').value) * 1000;
                    autoRefreshInterval = setInterval(takeScreenshot, interval);
                  } else {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                  }
                });

                // Show coordinates on hover
                document.getElementById('screenshot').addEventListener('mousemove', function(event) {
                  const img = event.target;
                  const rect = img.getBoundingClientRect();
                  const x = Math.round((event.clientX - rect.left) * (img.naturalWidth / rect.width));
                  const y = Math.round((event.clientY - rect.top) * (img.naturalHeight / rect.height));
                  
                  const coordsDiv = document.getElementById('coordinates');
                  coordsDiv.style.display = 'block';
                  coordsDiv.style.left = (event.clientX + 10) + 'px';
                  coordsDiv.style.top = (event.clientY - 30) + 'px';
                  coordsDiv.textContent = x + ', ' + y;
                });

                document.getElementById('screenshot').addEventListener('mouseleave', function() {
                  document.getElementById('coordinates').style.display = 'none';
                });
              </script>
            </body>
            </html>
          `);
        });

        // API Routes
        app.post('/api/browser/start', async (req, res) => {
          try {
            if (!browser) {
              browser = await puppeteer.launch({
                headless: true,
                args: [
                  '--no-sandbox',
                  '--disable-setuid-sandbox',
                  '--disable-dev-shm-usage',
                  '--disable-gpu',
                  '--remote-debugging-port=9222'
                ]
              });
              page = await browser.newPage();
              await page.setViewport({ width: 1920, height: 1080 });
              isRunning = true;
              
              // Store browser state in Redis
              await redisClient.set('browser:running', 'true');
              
              io.emit('browserStatus', { status: 'started' });
              res.json({ success: true, message: 'Browser started' });
            } else {
              res.json({ success: false, message: 'Browser already running' });
            }
          } catch (error) {
            res.status(500).json({ success: false, error: error.message });
          }
        });

        app.post('/api/browser/stop', async (req, res) => {
          try {
            if (browser) {
              await browser.close();
              browser = null;
              page = null;
              isRunning = false;
              
              await redisClient.set('browser:running', 'false');
              
              io.emit('browserStatus', { status: 'stopped' });
              res.json({ success: true, message: 'Browser stopped' });
            } else {
              res.json({ success: false, message: 'Browser not running' });
            }
          } catch (error) {
            res.status(500).json({ success: false, error: error.message });
          }
        });

        app.post('/api/screenshot', async (req, res) => {
          try {
            if (!page) {
              return res.status(400).json({ success: false, message: 'Browser not running' });
            }
            
            const screenshot = await page.screenshot({ 
              type: 'png',
              fullPage: true 
            });
            
            const base64Image = screenshot.toString('base64');
            io.emit('screenshot', { image: base64Image });
            
            res.json({ success: true, message: 'Screenshot taken' });
          } catch (error) {
            res.status(500).json({ success: false, error: error.message });
          }
        });

        app.post('/api/navigate', async (req, res) => {
          try {
            if (!page) {
              return res.status(400).json({ success: false, message: 'Browser not running' });
            }
            
            const { url } = req.body;
            await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
            
            // Take screenshot after navigation
            setTimeout(async () => {
              const screenshot = await page.screenshot({ type: 'png', fullPage: true });
              const base64Image = screenshot.toString('base64');
              io.emit('screenshot', { image: base64Image });
            }, 2000);
            
            res.json({ success: true, message: 'Navigated to ' + url });
          } catch (error) {
            res.status(500).json({ success: false, error: error.message });
          }
        });

        app.post('/api/click', async (req, res) => {
          try {
            if (!page) {
              return res.status(400).json({ success: false, message: 'Browser not running' });
            }
            
            const { selector } = req.body;
            await page.waitForSelector(selector, { timeout: 5000 });
            await page.click(selector);
            
            // Take screenshot after click
            setTimeout(async () => {
              const screenshot = await page.screenshot({ type: 'png', fullPage: true });
              const base64Image = screenshot.toString('base64');
              io.emit('screenshot', { image: base64Image });
            }, 1000);
            
            res.json({ success: true, message: 'Clicked element: ' + selector });
          } catch (error) {
            res.status(500).json({ success: false, error: error.message });
          }
        });

        app.post('/api/click-coords', async (req, res) => {
          try {
            if (!page) {
              return res.status(400).json({ success: false, message: 'Browser not running' });
            }
            
            const { x, y } = req.body;
            await page.mouse.click(x, y);
            
            // Take screenshot after click
            setTimeout(async () => {
              const screenshot = await page.screenshot({ type: 'png', fullPage: true });
              const base64Image = screenshot.toString('base64');
              io.emit('screenshot', { image: base64Image });
            }, 1000);
            
            res.json({ success: true, message: 'Clicked at coordinates: ' + x + ', ' + y });
          } catch (error) {
            res.status(500).json({ success: false, error: error.message });
          }
        });

        app.post('/api/type', async (req, res) => {
          try {
            if (!page) {
              return res.status(400).json({ success: false, message: 'Browser not running' });
            }
            
            const { text } = req.body;
            await page.keyboard.type(text);
            
            res.json({ success: true, message: 'Typed text: ' + text });
          } catch (error) {
            res.status(500).json({ success: false, error: error.message });
          }
        });

        // WebSocket connection handling
        io.on('connection', (socket) => {
          console.log('Client connected:', socket.id);
          
          socket.on('disconnect', () => {
            console.log('Client disconnected:', socket.id);
          });
        });

        const PORT = process.env.PORT || 3000;
        server.listen(PORT, () => {
          console.log('Remote desktop server running on port ' + PORT);
        });

        // Graceful shutdown
        process.on('SIGTERM', async () => {
          console.log('Shutting down...');
          if (browser) {
            await browser.close();
          }
          process.exit(0);
        });
        EOF

    - name: Start remote desktop server and tunnel
      run: |
        # Start the server in background
        node server.js &
        SERVER_PID=$!
        echo "Server started with PID: $SERVER_PID"
        
        # Wait for server to start
        sleep 5
        
        # Get tunnel password (public IP)
        TUNNEL_PASSWORD=$(curl -s https://loca.lt/mytunnelpassword)
        echo "Tunnel password: $TUNNEL_PASSWORD"
        
        # Start localtunnel with custom subdomain
        TIMESTAMP=$(date +%s)
        lt --port 3000 --subdomain remote-desktop-$TIMESTAMP &
        LT_PID=$!
        
        echo "Localtunnel started with PID: $LT_PID"
        
        # Wait a moment for localtunnel to initialize
        sleep 10
        
        # Display access information
        echo "🌐 Remote Desktop Interface is accessible at:"
        echo "🔗 https://remote-desktop-$TIMESTAMP.loca.lt"
        echo ""
        echo "� Tunnel Password: $TUNNEL_PASSWORD"
        echo ""
        echo "� Instructions:"
        echo "1. Click the link above"
        echo "2. Enter the tunnel password when prompted"
        echo "3. Click 'Continue to site'"
        echo "4. Use 'Start Browser' to begin"
        echo ""
        echo "⏰ The session will end when the workflow times out"
        
        # Save URLs and password for reference
        echo "https://remote-desktop-$TIMESTAMP.loca.lt" > public_url.txt
        echo "Tunnel Password: $TUNNEL_PASSWORD" > tunnel_password.txt
        
        # Keep the processes running
        wait $SERVER_PID

    - name: Execute action based on input
      run: |
        ACTION="${{ github.event.inputs.action }}"
        URL="${{ github.event.inputs.url }}"
        X="${{ github.event.inputs.x }}"
        Y="${{ github.event.inputs.y }}"
        TEXT="${{ github.event.inputs.text }}"
        SELECTOR="${{ github.event.inputs.selector }}"

        case $ACTION in
          "start")
            curl -X POST http://localhost:3000/api/browser/start
            ;;
          "stop")
            curl -X POST http://localhost:3000/api/browser/stop
            ;;
          "screenshot")
            curl -X POST http://localhost:3000/api/screenshot
            ;;
          "navigate")
            curl -X POST -H "Content-Type: application/json" \
                 -d "{\"url\":\"$URL\"}" \
                 http://localhost:3000/api/navigate
            ;;
          "click")
            if [ -n "$SELECTOR" ]; then
              curl -X POST -H "Content-Type: application/json" \
                   -d "{\"selector\":\"$SELECTOR\"}" \
                   http://localhost:3000/api/click
            elif [ -n "$X" ] && [ -n "$Y" ]; then
              curl -X POST -H "Content-Type: application/json" \
                   -d "{\"x\":$X,\"y\":$Y}" \
                   http://localhost:3000/api/click-coords
            fi
            ;;
          "type")
            curl -X POST -H "Content-Type: application/json" \
                 -d "{\"text\":\"$TEXT\"}" \
                 http://localhost:3000/api/type
            ;;
        esac

    - name: Upload public URL as artifact
      uses: actions/upload-artifact@v4
      with:
        name: public-url
        path: public_url.txt
        retention-days: 1

    - name: Upload tunnel password as artifact
      uses: actions/upload-artifact@v4
      with:
        name: tunnel-password
        path: tunnel_password.txt
        retention-days: 1

    - name: Keep session alive
      run: |
        echo "🔄 Keeping session alive..."
        echo "The interface is accessible through the ngrok URL shown above"
        echo "This will continue until the workflow times out"
        sleep 300
