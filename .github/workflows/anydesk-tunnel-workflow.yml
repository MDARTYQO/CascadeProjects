name: AnyDesk Remote Desktop with Tunnel

on:
  workflow_dispatch:
    inputs:
      desktop_type:
        description: 'Desktop environment'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - lxde
          - gnome
      anydesk_password:
        description: 'AnyDesk password (leave blank for auto-generated)'
        required: false
      resolution:
        description: 'Screen resolution'
        required: false
        default: '1920x1080'

jobs:
  anydesk-remote:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Desktop Environment
      run: |
        echo "🖥️ Setting up desktop environment for AnyDesk..."
        
        # Install desktop environment
        sudo apt-get update
        sudo apt-get install -y \
          xfce4 \
          xfce4-goodies \
          xorg \
          dbus-x11 \
          x11-xserver-utils \
          pulseaudio \
          alsa-utils
        
        # Install additional tools
        sudo apt-get install -y \
          firefox \
          curl \
          wget \
          git \
          nano \
          htop \
          unzip
        
        echo "✅ Desktop environment installed"

    - name: Install AnyDesk
      run: |
        echo "📥 Installing AnyDesk..."
        
        # Install dependencies first (Ubuntu 24.04 compatible)
        echo "🔧 Installing required dependencies for Ubuntu 24.04..."
        sudo apt-get update
        
        # Install Ubuntu 24.04 compatible dependencies
        sudo apt-get install -y \
          libgtk-3-0 \
          libgdk-pixbuf-2.0-0 \
          libxss1 \
          libasound2t64 \
          libxtst6 \
          libxrandr2 \
          libxcomposite1 \
          libxcursor1 \
          libxdamage1 \
          libxi6 \
          libnss3 \
          libcups2 \
          libxfixes3 \
          libgbm1 \
          libxrender1 \
          libcairo-gobject2 \
          libpango-1.0-0 \
          libglib2.0-0 \
          libatspi2.0-0 \
          libdrm2 \
          libxkbcommon0 \
          libwayland-client0 \
          libwayland-cursor0 \
          libxcb-xinerama0 \
          libxcb-cursor0 \
          libxkbfile1
        
        echo "✅ Dependencies installed successfully"
        
        # Try multiple AnyDesk download sources
        echo "🔍 Trying to download AnyDesk from official sources..."
        
        # Method 1: Try latest version with proper error handling
        echo "📥 Attempting to download AnyDesk..."
        
        # Try different versions with better error handling
        VERSIONS=(
          "6.3.0-1"
          "6.2.3-1" 
          "6.1.1-1"
          "6.0.1-1"
          "5.5.6-1"
        )
        
        ANYDESK_DOWNLOADED=false
        
        for VERSION in "${VERSIONS[@]}"; do
          echo "🔄 Trying version: $VERSION"
          if wget --timeout=30 --tries=3 "https://download.anydesk.com/anydesk_${VERSION}_amd64.deb" -O anydesk.deb 2>/dev/null; then
            if [ -f "anydesk.deb" ] && [ -s "anydesk.deb" ]; then
              echo "✅ Successfully downloaded AnyDesk version $VERSION"
              ANYDESK_DOWNLOADED=true
              break
            fi
          fi
          echo "❌ Failed to download version $VERSION"
        done
        
        # Method 2: If all direct downloads fail, try alternative approach
        if [ "$ANYDESK_DOWNLOADED" = false ]; then
          echo "⚠️ Direct download failed, trying alternative method..."
          
          # Try to get the latest version from AnyDesk website
          echo "🔍 Detecting latest version from AnyDesk website..."
          LATEST_VERSION=$(curl -s --max-time 30 "https://anydesk.com/en/downloads" | grep -o 'anydesk_[0-9]\+\.[0-9]\+\.[0-9]\+-1_amd64\.deb' | head -1)
          
          if [ -n "$LATEST_VERSION" ]; then
            echo "📥 Found latest version: $LATEST_VERSION"
            if wget --timeout=30 --tries=3 "https://download.anydesk.com/$LATEST_VERSION" -O anydesk.deb 2>/dev/null; then
              if [ -f "anydesk.deb" ] && [ -s "anydesk.deb" ]; then
                ANYDESK_DOWNLOADED=true
                echo "✅ Successfully downloaded latest version"
              fi
            fi
          else
            echo "❌ Could not detect latest version from website"
          fi
        fi
        
        # Method 3: If all downloads fail, use Chrome Remote Desktop as fallback
        if [ "$ANYDESK_DOWNLOADED" = false ]; then
          echo "❌ All AnyDesk download attempts failed"
          echo "🔄 Using Chrome Remote Desktop as fallback..."
          
          # Install Chrome Remote Desktop
          echo "📥 Installing Chrome Remote Desktop..."
          
          # Add Google repository
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-archive-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          
          # Install Chrome and Chrome Remote Desktop
          sudo apt-get install -y google-chrome-stable
          sudo apt-get install -y chrome-remote-desktop
          
          # Generate PIN for Chrome Remote Desktop
          PIN=$(openssl rand -base64 6 | tr -d "=+/" | cut -c1-6)
          echo "🔐 Chrome Remote Desktop PIN: $PIN"
          
          # Create Chrome Remote Desktop info
          cat > anydesk_info.txt << EOF
          Chrome Remote Desktop Connection Information:
          =======================================
          PIN: $PIN
          Desktop: ${{ github.event.inputs.desktop_type }}
          Resolution: ${{ github.event.inputs.resolution }}
          
          Connection Steps:
          1. Go to https://remotedesktop.google.com/
          2. Install Chrome Remote Desktop on your computer
          3. Access the remote computer
          4. Use PIN: $PIN
          5. Enjoy remote desktop!
          EOF
          
          echo "CHROME_SETUP:success" > setup_status.txt
          echo "CHROME_PIN:$PIN" > connection_info.txt
          
          echo "🌐 Chrome Remote Desktop setup completed successfully"
          exit 0
        fi
        
        # If we have a valid AnyDesk package, install it
        if [ "$ANYDESK_DOWNLOADED" = true ]; then
          echo "📦 Installing AnyDesk package..."
          
          # Check package integrity
          if dpkg -c anydesk.deb > /dev/null 2>&1; then
            echo "✅ Package integrity check passed"
            
            # Install AnyDesk with dependency resolution
            echo "🔧 Installing AnyDesk with dependencies..."
            if sudo dpkg -i anydesk.deb; then
              echo "✅ AnyDesk installed successfully"
            else
              echo "⚠️ Installation had issues, fixing dependencies..."
              sudo apt-get install -f -y
              echo "✅ Dependencies fixed"
            fi
            
            # Verify installation
            if command -v anydesk > /dev/null 2>&1; then
              echo "✅ AnyDesk command available"
            else
              echo "❌ AnyDesk command not found after installation"
              echo "🔄 Falling back to Chrome Remote Desktop..."
              # Fallback to Chrome Remote Desktop
              goto chrome_fallback
            fi
            
            # Configure AnyDesk for unattended access
            echo "🔧 Configuring AnyDesk..."
            sudo systemctl enable anydesk 2>/dev/null || echo "⚠️ Could not enable anydesk service"
            sudo systemctl start anydesk 2>/dev/null || echo "⚠️ Could not start anydesk service"
            
            # Generate password if not provided
            if [ -z "${{ github.event.inputs.anydesk_password }}" ]; then
              ANYDESK_PASS=$(openssl rand -base64 12 | tr -d "=+/" | cut -c1-10)
            else
              ANYDESK_PASS="${{ github.event.inputs.anydesk_password }}"
            fi
            
            echo "🔐 AnyDesk password: $ANYDESK_PASS"
            
            # Set AnyDesk password
            echo "$ANYDESK_PASS" | anydesk --set-password 2>/dev/null || echo "⚠️ Could not set AnyDesk password"
            
            # Get AnyDesk ID
            sleep 5
            ANYDESK_ID=$(anydesk --get-id 2>/dev/null || echo "generating...")
            
            echo "📋 AnyDesk Information:"
            echo "🆔 AnyDesk ID: $ANYDESK_ID"
            echo "🔐 Password: $ANYDESK_PASS"
            echo "🖥️ Desktop: ${{ github.event.inputs.desktop_type }}"
            echo "📺 Resolution: ${{ github.event.inputs.resolution }}"
            
            # Save connection info
            cat > anydesk_info.txt << EOF
            AnyDesk Connection Information:
            ============================
            AnyDesk ID: $ANYDESK_ID
            Password: $ANYDESK_PASS
            Desktop: ${{ github.event.inputs.desktop_type }}
            Resolution: ${{ github.event.inputs.resolution }}
            
            Connection Steps:
            1. Open AnyDesk on your computer
            2. Enter ID: $ANYDESK_ID
            3. Use password: $ANYDESK_PASS
            4. Enjoy remote desktop!
            EOF
            
            echo "ANYDESK_SETUP:success" > setup_status.txt
            echo "✅ AnyDesk setup completed successfully"
            
          else
            echo "❌ Package integrity check failed"
            echo "🔄 Falling back to Chrome Remote Desktop..."
            goto chrome_fallback
          fi
        fi
        
        # Chrome Remote Desktop fallback label
        chrome_fallback:
        echo "🌐 Setting up Chrome Remote Desktop fallback..."
        
        # Install Chrome Remote Desktop with Ubuntu 24.04 compatibility
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-archive-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable chrome-remote-desktop
        
        PIN=$(openssl rand -base64 6 | tr -d "=+/" | cut -c1-6)
        echo "🔐 Chrome Remote Desktop PIN: $PIN"
        
        cat > anydesk_info.txt << 'EOF'
        Chrome Remote Desktop Connection Information:
        =======================================
        PIN: $PIN
        Desktop: ${{ github.event.inputs.desktop_type }}
        Resolution: ${{ github.event.inputs.resolution }}
        
        Connection Steps:
        1. Go to https://remotedesktop.google.com/
        2. Install Chrome Remote Desktop on your computer
        3. Access the remote computer
        4. Use PIN: $PIN
        5. Enjoy remote desktop!
        EOF
        
        echo "CHROME_SETUP:success" > setup_status.txt
        echo "CHROME_PIN:$PIN" > connection_info.txt

    - name: Start Desktop Environment
      run: |
        # Start X server
        export DISPLAY=:0
        Xvfb :0 -screen 0 ${{ github.event.inputs.resolution || '1920x1080' }}x24 &
        
        # Start desktop environment
        sudo -u runner startxfce4 &
        
        # Start pulseaudio for sound
        pulseaudio --start &
        
        # Wait for desktop to initialize
        sleep 10
        
        echo "🖥️ Desktop environment started"

    - name: Install Tunneling Tools
      run: |
        # Install localtunnel
        npm install -g localtunnel
        
        # Create AnyDesk tunnel management page
        cat > anydesk-tunnel.js << 'EOF'
        const express = require('express');
        const http = require('http');
        const { spawn, exec } = require('child_process');
        const fs = require('fs');

        const app = express();
        const server = http.createServer(app);
        
        // Serve connection page
        app.get('/', (req, res) => {
          const anydeskInfo = fs.readFileSync('anydesk_info.txt', 'utf8');
          res.send(`
            <!DOCTYPE html>
            <html>
            <head>
              <title>AnyDesk Remote Desktop</title>
              <meta charset="utf-8">
              <style>
                body { 
                  font-family: Arial, sans-serif; 
                  margin: 40px; 
                  background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%);
                  color: white;
                  min-height: 100vh;
                }
                .container { 
                  max-width: 800px; 
                  margin: 0 auto; 
                  background: rgba(255,255,255,0.1);
                  padding: 30px;
                  border-radius: 15px;
                  backdrop-filter: blur(10px);
                }
                .info-box { 
                  background: rgba(255,255,255,0.2); 
                  padding: 20px; 
                  border-radius: 10px; 
                  margin: 20px 0;
                  border-left: 4px solid #00ff88;
                }
                .step { 
                  background: rgba(255,255,255,0.15); 
                  padding: 15px; 
                  margin: 10px 0; 
                  border-radius: 8px;
                }
                .highlight { 
                  color: #00ff88; 
                  font-weight: bold; 
                  font-size: 18px;
                }
                .button {
                  display: inline-block;
                  background: #00ff88;
                  color: #000;
                  padding: 12px 24px;
                  text-decoration: none;
                  border-radius: 8px;
                  font-weight: bold;
                  margin: 10px 5px;
                }
                .status {
                  padding: 10px;
                  border-radius: 5px;
                  margin: 10px 0;
                  font-weight: bold;
                }
                .status.active { background: #28a745; }
                .status.inactive { background: #dc3545; }
                pre {
                  background: rgba(0,0,0,0.3);
                  padding: 15px;
                  border-radius: 8px;
                  overflow-x: auto;
                  font-size: 14px;
                }
                .logo {
                  font-size: 48px;
                  text-align: center;
                  margin: 20px 0;
                }
              </style>
            </head>
            <body>
              <div class="container">
                <div class="logo">🖥️</div>
                <h1>AnyDesk Remote Desktop</h1>
                <p style="font-size: 18px;">Connect to your virtual desktop with AnyDesk!</p>
                
                <div class="info-box">
                  <h2>🔐 Connection Details</h2>
                  <pre>${anydeskInfo}</pre>
                </div>
                
                <div class="info-box">
                  <h2>📥 How to Connect</h2>
                  
                  <div class="step">
                    <h3>Step 1: Install AnyDesk</h3>
                    <p>Download from <a href="https://anydesk.com/download" style="color: #00ff88;">anydesk.com</a></p>
                  </div>
                  
                  <div class="step">
                    <h3>Step 2: Enter AnyDesk ID</h3>
                    <p>Open AnyDesk and enter the ID shown above</p>
                  </div>
                  
                  <div class="step">
                    <h3>Step 3: Enter Password</h3>
                    <p>Use the password provided above when prompted</p>
                  </div>
                  
                  <div class="step">
                    <h3>Step 4: Enjoy!</h3>
                    <p>You now have full control of the virtual desktop</p>
                  </div>
                </div>
                
                <div class="info-box">
                  <h2>🎯 What's Available</h2>
                  <ul>
                    <li>✅ Full desktop environment (XFCE)</li>
                    <li>✅ AnyDesk remote control</li>
                    <li>✅ File transfer</li>
                    <li>✅ Clipboard sharing</li>
                    <li>✅ Firefox browser</li>
                    <li>✅ Terminal access</li>
                    <li>✅ Sound support</li>
                  </ul>
                </div>
                
                <div class="info-box">
                  <h2>🌐 Connection Options</h2>
                  
                  <h3>Option 1: Direct AnyDesk Connection</h3>
                  <p>Use the AnyDesk ID above for direct connection</p>
                  
                  <h3>Option 2: Web-based Monitoring</h3>
                  <button onclick="checkStatus()" class="button">Check AnyDesk Status</button>
                  <div id="status-info" style="margin-top: 10px;"></div>
                </div>
                
                <div class="info-box">
                  <h2>⚡ AnyDesk Advantages</h2>
                  <ul>
                    <li>🚀 High performance remote desktop</li>
                    <li>🔄 Real-time collaboration</li>
                    <li>📁 File transfer capabilities</li>
                    <li>🔒 End-to-end encryption</li>
                    <li>🌍 Works from anywhere</li>
                    <li>📱 Mobile apps available</li>
                  </ul>
                </div>
                
                <div class="info-box">
                  <h2>⚠️ Important Notes</h2>
                  <ul>
                    <li>Session duration: Limited by GitHub Actions timeout</li>
                    <li>Network: Full internet access available</li>
                    <li>Performance: Optimized for remote desktop</li>
                    <li>Security: Use secure password for sensitive work</li>
                  </ul>
                </div>
              </div>
              
              <script>
                function checkStatus() {
                  fetch('/api/anydesk-status')
                    .then(res => res.json())
                    .then(data => {
                      const statusDiv = document.getElementById('status-info');
                      if (data.running) {
                        statusDiv.innerHTML = '<div class="status active">✅ AnyDesk is running</div>';
                      } else {
                        statusDiv.innerHTML = '<div class="status inactive">❌ AnyDesk is not running</div>';
                      }
                    });
                }
                
                // Auto-check status
                setTimeout(checkStatus, 2000);
              </script>
            </body>
            </html>
          `);
        });

        // API to check AnyDesk status
        app.get('/api/anydesk-status', (req, res) => {
          exec('pgrep anydesk', (error, stdout, stderr) => {
            res.json({ 
              running: !error,
              pid: error ? null : stdout.trim()
            });
          });
        });

        // API to restart AnyDesk
        app.post('/api/restart-anydesk', (req, res) => {
          exec('sudo systemctl restart anydesk', (error, stdout, stderr) => {
            res.json({ 
              success: !error,
              message: error ? stderr : 'AnyDesk restarted successfully'
            });
          });
        });

        const PORT = 3000;
        server.listen(PORT, () => {
          console.log('🖥️ AnyDesk Tunnel Server running on port ' + PORT);
          console.log('📡 Ready for AnyDesk connections');
        });
        EOF

    - name: Start AnyDesk and Tunnel Services
      run: |
        # Check which remote desktop solution was set up
        if [ -f "setup_status.txt" ]; then
          SETUP_TYPE=$(cat setup_status.txt)
        else
          SETUP_TYPE="ANYDESK_SETUP:success"
        fi
        
        echo "🔍 Setup type detected: $SETUP_TYPE"
        
        if [ "$SETUP_TYPE" = "ANYDESK_SETUP:success" ]; then
          # AnyDesk setup
          echo "🖥️ Setting up AnyDesk services..."
          
          # Ensure AnyDesk is running
          sudo systemctl restart anydesk
          sleep 5
          
          # Get final AnyDesk ID
          ANYDESK_ID=$(anydesk --get-id 2>/dev/null)
          echo "🆔 Final AnyDesk ID: $ANYDESK_ID"
          
          # Update connection info with final ID
          sed -i "s/AnyDesk ID: .*/AnyDesk ID: $ANYDESK_ID/" anydesk_info.txt
          
        elif [ "$SETUP_TYPE" = "CHROME_SETUP:success" ]; then
          # Chrome Remote Desktop setup
          echo "🌐 Setting up Chrome Remote Desktop services..."
          
          # Get Chrome Remote Desktop info
          if [ -f "connection_info.txt" ]; then
            CHROME_PIN=$(grep "CHROME_PIN:" connection_info.txt | cut -d':' -f2)
            echo "🔐 Chrome Remote Desktop PIN: $CHROME_PIN"
            
            # Create Chrome Remote Desktop info
            cat > anydesk_info.txt << EOF
            Chrome Remote Desktop Connection Information:
            =======================================
            PIN: $CHROME_PIN
            Desktop: ${{ github.event.inputs.desktop_type }}
            Resolution: ${{ github.event.inputs.resolution }}
            
            Connection Steps:
            1. Go to https://remotedesktop.google.com/
            2. Install Chrome Remote Desktop on your computer
            3. Access the remote computer
            4. Use PIN: $CHROME_PIN
            5. Enjoy remote desktop!
            EOF
          fi
        fi
        
        # Start tunnel server
        node anydesk-tunnel.js &
        TUNNEL_SERVER_PID=$!
        echo "Tunnel server started with PID: $TUNNEL_SERVER_PID"
        
        # Wait for server to start
        sleep 5
        
        # Get tunnel password
        TUNNEL_PASSWORD=$(curl -s https://loca.lt/mytunnelpassword 2>/dev/null || echo "")
        
        # Backup IP detection
        IP1=$(curl -s https://api.ipify.org 2>/dev/null || echo "")
        IP2=$(curl -s https://ipinfo.io/ip 2>/dev/null || echo "")
        
        # Use most reliable IP
        if [ -n "$IP1" ]; then
            TUNNEL_PASSWORD="$IP1"
        elif [ -n "$TUNNEL_PASSWORD" ]; then
            TUNNEL_PASSWORD="$TUNNEL_PASSWORD"
        else
            TUNNEL_PASSWORD="auto-detected"
        fi
        
        echo "🔐 Tunnel password: $TUNNEL_PASSWORD"
        
        # Start localtunnel
        TIMESTAMP=$(date +%s)
        lt --port 3000 --subdomain remote-$TIMESTAMP &
        LT_PID=$!
        
        echo "Localtunnel started with PID: $LT_PID"
        
        # Wait for tunnel to initialize
        sleep 15
        
        # Test tunnel
        TUNNEL_URL="https://remote-$TIMESTAMP.loca.lt"
        if curl -s "$TUNNEL_URL" > /dev/null; then
            echo "✅ Tunnel is working!"
        else
            echo "⚠️ Tunnel might not be working"
        fi
        
        # Display connection information
        echo ""
        echo "🖥️ Remote Desktop is ready!"
        echo ""
        echo "🔗 Management Portal: $TUNNEL_URL"
        echo "🔐 Tunnel Password: $TUNNEL_PASSWORD"
        echo ""
        
        if [ "$SETUP_TYPE" = "ANYDESK_SETUP:success" ]; then
          echo "📋 AnyDesk Connection Details:"
          echo "🆔 AnyDesk ID: $ANYDESK_ID"
          echo "🔐 Password: $(grep 'Password:' anydesk_info.txt | cut -d' ' -f2)"
          echo ""
          echo "📱 Connection Steps:"
          echo "1. Open AnyDesk on your device"
          echo "2. Enter ID: $ANYDESK_ID"
          echo "3. Use password when prompted"
          echo "4. Enjoy full remote desktop!"
        elif [ "$SETUP_TYPE" = "CHROME_SETUP:success" ]; then
          echo "📋 Chrome Remote Desktop Connection Details:"
          echo "🔐 PIN: $CHROME_PIN"
          echo ""
          echo "📱 Connection Steps:"
          echo "1. Go to https://remotedesktop.google.com/"
          echo "2. Access remote computer"
          echo "3. Use PIN: $CHROME_PIN"
          echo "4. Enjoy remote desktop!"
        fi
        
        echo ""
        echo "🌐 Alternative: Use management portal for status"
        echo "🔗 $TUNNEL_URL (password: $TUNNEL_PASSWORD)"
        echo ""
        echo "⏰ Session will end when workflow times out"
        
        # Save access info
        echo "$TUNNEL_URL" > portal_url.txt
        echo "Tunnel Password: $TUNNEL_PASSWORD" > tunnel_password.txt
        
        # Keep processes running
        wait $TUNNEL_SERVER_PID

    - name: Upload connection information
      uses: actions/upload-artifact@v4
      with:
        name: anydesk-connection-info
        path: |
          anydesk_info.txt
          portal_url.txt
          tunnel_password.txt
          anydesk_id.txt
        retention-days: 1

    - name: Keep AnyDesk alive
      run: |
        echo "🖥️ AnyDesk Remote Desktop is active!"
        echo "🆔 AnyDesk ID: $(cat anydesk_id.txt)"
        echo "🔗 Portal: $(cat portal_url.txt)"
        echo "🔐 Password: $(cat tunnel_password.txt)"
        echo ""
        echo "💡 AnyDesk Advantages:"
        echo "- High performance remote desktop"
        echo "- File transfer capabilities"
        echo "- Works on all devices"
        echo "- No port forwarding needed"
        echo "- Secure and encrypted"
        echo ""
        echo "⏰ Session active until workflow timeout"
        sleep 600
